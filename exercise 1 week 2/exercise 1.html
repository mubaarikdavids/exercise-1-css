<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Our Products</h1>
    </header>

    <main class="container">
        <div class="product-card">
            <div class="product-image" style="background-color: #FF6B6B;"></div>
            <h3 class="product-name">Product 1</h3>
            <p class="product-price">$9.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-image"></div> style="background-color: #4ECDC4;"></div>
            <h3 class="product-name">legless chair</h3>
            <p class="product-price">$14.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-image" style="background-color: #FFE66D;"></div>
            <h3 class="product-name">Product 3</h3>
            <p class="product-price">$19.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-image" style="background-color: #95E1D3;"></div>
            <h3 class="product-name">Product 4</h3>
            <p class="product-price">$24.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-image" style="background-color: #C7CEEA;"></div>
            <h3 class="product-name">Product 5</h3>
            <p class="product-price">$34.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-image" style="background-color: #F38181;"></div>
            <h3 class="product-name">Product 6</h3>
            <p class="product-price">$49.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </main>
</body>
</html>
